services:

  frontend:

    build:
      context: ./frontend

    container_name: frontend_react

    working_dir: /app

    user: node

    volumes:
      - ./frontend:/app
      # - frontend_node_modules:/app/node_modules

    ports:
      - "5173:5173"

    tty: true

    stdin_open: true

    networks:
      - localnet

    command: tail -f /dev/null

  mysql:
    image: mariadb:latest

    container_name: mysql-container-sekripsi

    ports:
      - "3306:3306"

    environment:
      MARIADB_ROOT_PASSWORD: susah_diingat
      TZ: Asia/Makassar

    volumes:
      - ./mysql/data:/var/lib/mysql

    restart: unless-stopped

    networks:
      - localnet


  fastapi:
    build:
      args:
        user: putu
        uid: 1000
      context: ./backend
    image: my-fastapi-sekripsi
    container_name: fastapi_app_sekripsi
    restart: unless-stopped
    working_dir: /app
    environment:
      TZ: Asia/Makassar
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mysql
    volumes:
      - ./backend:/app
    networks:
      - localnet
    command: bash -c "bash -u /app/scripts/startup.sh"

networks:
  localnet:
    driver: bridge